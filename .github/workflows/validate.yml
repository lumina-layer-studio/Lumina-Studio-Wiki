name: Validate public Wiki

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run public behavior tests
        run: pnpm test:public

      - name: Protect the published-media baseline
        if: github.event_name == 'pull_request'
        run: node scripts/media-contributions.mjs --base "${{ github.event.pull_request.base.sha }}"

      - name: Check tracked repository boundary
        run: python3 scripts/public_repo_guard.py

      - name: Type-check site source
        run: pnpm typecheck

      - name: Build both locales
        run: pnpm build

      - name: Check generated site boundary
        run: python3 scripts/public_repo_guard.py --tree build
